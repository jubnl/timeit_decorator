name: Upload Python Package

on:
  release:
    types: [ published ]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.x'

      - name: Install build and project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
          pip install .
          pip install .[dev]

      - name: Run tests with pytest
        run: |
          pytest --cov --cov-branch --cov-report=xml --junitxml=junit.xml -o junit_family=legacy

      - name: SonarQube Analysis
        run: |
          pysonar \
            --sonar-host-url ${{ vars.SONAR_HOST_URL }} \
            --sonar-project-key ${{ vars.SONAR_PROJECT_KEY }} \
            --sonar-sources ${{ vars.SONAR_SOURCES }} \
            --sonar-tests ${{ vars.SONAR_TESTS }} \
            --sonar-python-version ${{ vars.SONAR_PYTHON_VERSION }} \
            --sonar-python-coverage-report-paths coverage.xml \
            --token ${{ secrets.SONAR_TOKEN }}

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: junit.xml

      - name: Build package
        run: python -m build

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true